<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<img src="YAGEO Tokin.png" alt="Company Logo" width="200" height="70">
<title>Anodization Machine Status</title>
<link rel="stylesheet" href="style.css"> 
</head>
<body>
  <header class="topbar">
    <h1>Anodization Machine Status</h1>
    <span class="dept-badge">By Equipment Engineering Department</span>
    <div class="datetime">
      <div class="time"id="time">--:--</div>
      <div class="date"id="date">--, --</div>
    </div>
  </header>

  <section class="summary-bar">
    <div class="summary-item total">
      <div class="summary-label">TOTAL</div>
      <div class="summary-value" id="sumTotal">0</div>
      <div class="summary-unit">M/C</div>
    </div>
    <div class="summary-item online">
      <div class="summary-label">ONLINE</div>
      <div class="summary-value" id="sumOnline">0</div>
      <div class="summary-unit">M/C</div>
    </div>
      <div class="summary-item mes">
      <div class="summary-label">MES</div>
      <div class="summary-value" id="sumMES">0</div>
      <div class="summary-unit">M/C</div>
    </div>
      <div class="summary-item manual">
      <div class="summary-label">MANUAL</div>
      <div class="summary-value" id="sumMANUAL">0</div>
      <div class="summary-unit">M/C</div>
    </div>
    <!-- </div>
      <div class="summary-item nowip">
      <div class="summary-label">NOWIP</div>
      <div class="summary-value" id="sumNOWIP">0</div>
      <div class="summary-unit">M/C</div>
    </div> -->
    <!-- </div>
      <div class="summary-item idle">
      <div class="summary-label">IDLE</div>
      <div class="summary-value" id="sumIDLE">0</div>
      <div class="summary-unit">M/C</div>
    </div> -->
    <div class="summary-item offline">
      <div class="summary-label">OFFLINE</div>
      <div class="summary-value" id="sumOffline">0</div>
      <div class="summary-unit">M/C</div>
    </div>
  </section>

  <main class="grid" id="machineGrid">
    <!-- machine cards injected by script.js -->
  </main>

  <!-- Popup / Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <button class="modal-back" id="modalClose">&#9664;</button>
        <div class="modal-title">
          <span class="modal-title-main">Anodization</span>
          <span class="modal-title-sub" id="modalMachineName">No. Z01</span>
        </div>
        <div class="tower-lamp">
          <div class="tower-lamp-label">STATUS</div>
          <div class="tower-lamp-lights">
            <span class="lamp green" id="lampGreen"></span> 
            <span class="lamp gray" id="lampGray"></span>
          </div>
        </div>
      <div class="modal-loading" id="modalLoading">Loading data...</div>
      <div class="bath-grid" id="bathGrid"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
